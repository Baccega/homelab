palette = 'gruvbox_dark'

[palettes.gruvbox_dark]
color_fg0 = '#fbf1c7'
color_bg1 = '#3c3836'
color_bg3 = '#665c54'
color_blue = '#458588'
color_aqua = '#689d6a'
color_green = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#d79921'

[username]
show_always = true
style_user = "bg:color_orange fg:color_fg0"
style_root = "bg:color_orange fg:color_fg0"
format = '[¾░®â $user]($style)'

[hostname]
format = "[$hostname]($style)"
style = "bg:color_orange fg:color_fg0"
ssh_only = true

[directory]
style = "fg:color_fg0 bg:color_yellow"
format = "[ $path ]($style)"
truncate_to_repo = false

